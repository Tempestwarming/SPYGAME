<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find The Spy</title>
    <style>
        :root { --red-glow: rgba(255, 0, 0, 0.7); --dark-bg: #000000; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', Courier, monospace; background-color: var(--dark-bg); color: white; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-size: cover; background-position: center; background-repeat: no-repeat; text-align: center; position: absolute; top: 0; left: 0; }
        .active { display: flex; }
        
        /* BACKGROUNDS - Assuming files are in the main area */
        #menu-screen { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('main_spy.png'); }
        #setup-screen { background: radial-gradient(circle at center, #300000 0%, #000 100%); }
        #reveal-screen { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('pointing_shadows.png'); }
        #game-screen { background: black; }

        h1 { font-size: 2.5rem; text-shadow: 0 0 15px red; margin-bottom: 30px; text-transform: uppercase; }
        h2 { font-size: 2rem; margin-bottom: 10px; color: #ff4d4d; }
        .btn { background: rgba(40, 40, 40, 0.9); border: 1px solid #555; color: white; padding: 15px 30px; margin: 10px; border-radius: 8px; font-size: 1.1rem; width: 280px; cursor: pointer; text-transform: uppercase; font-family: inherit; }
        .btn:active { background: #600; border-color: red; box-shadow: 0 0 10px red; }
        .setup-group { width: 85%; margin: 10px 0; text-align: left; }
        .setup-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
        input[type=range] { width: 100%; height: 10px; border-radius: 5px; accent-color: red; cursor: pointer; }
        #swipe-zone { width: 100%; height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #secret-box { font-size: 2.2rem; background: rgba(255, 0, 0, 0.3); padding: 30px; border-radius: 10px; border: 2px solid red; opacity: 0; transition: transform 0.3s ease-out, opacity 0.3s; transform: translateY(50px); pointer-events: none; }
        .swiped-up #secret-box { opacity: 1; transform: translateY(0); }
        .swiped-up #swipe-prompt { opacity: 0; }
        #timer-display { font-size: 6rem; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px red; }
    </style>
</head>
<body>

    <audio id="game-music" loop preload="auto">
        <source src="spy-music.mp3" type="audio/mpeg">
    </audio>

    <div id="menu-screen" class="screen active">
        <h1>FIND THE SPY</h1>
        <button class="btn" onclick="showScreen('setup-screen')">NEW GAME</button>
        <button class="btn" id="sound-btn" onclick="toggleSound()">SOUND: ON</button>
    </div>

    <div id="setup-screen" class="screen">
        <h2>SETUP</h2>
        <div class="setup-group">
            <label>Players: <span id="p-val">5</span></label>
            <input type="range" min="3" max="20" value="5" id="players" oninput="updateVal('p-val', this.value)">
        </div>
        <div class="setup-group">
            <label>Spies: <span id="s-val">1</span></label>
            <input type="range" min="1" max="5" value="1" id="spies" oninput="updateVal('s-val', this.value)">
        </div>
        <div class="setup-group">
            <label>Time: <span id="d-val">5</span> min</label>
            <input type="range" min="1" max="15" value="5" id="duration" oninput="updateVal('d-val', this.value)">
        </div>
        <div class="setup-group">
            <label>Category</label>
            <select id="category" class="btn" style="width:100%; height:50px;">
                <option value="places.csv">Places</option>
                <option value="jobs.csv">Jobs</option>
            </select>
        </div>
        <button class="btn" style="background:#800;" onclick="startGame()">START GAME</button>
    </div>

    <div id="reveal-screen" class="screen">
        <h2 id="player-title">PLAYER 1</h2>
        <div id="swipe-zone" onmousedown="handleSwipe(true)" onmouseup="handleSwipe(false)" ontouchstart="handleSwipe(true)" ontouchend="handleSwipe(false)">
            <p id="swipe-prompt">↑ HOLD TO REVEAL ↑</p>
            <div id="secret-box">WORD</div>
        </div>
        <button id="next-btn" class="btn" style="visibility:hidden; background:white; color:black;" onclick="nextPlayer()">NEXT PLAYER</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer-display">00:00</div>
        <button id="start-timer-btn" class="btn" onclick="runTimer()">START TIMER</button>
        <button id="stop-timer-btn" class="btn" style="display:none; background:#444;" onclick="endTimer()">STOP & REVEAL</button>
        <button id="reveal-spy-btn" class="btn" style="display:none; background:red;" onclick="showFinalReveal()">REVEAL THE SPY</button>
    </div>

    <script>
        let gameState = { players: 0, spies: [], currentPlayer: 1, secretWord: "", duration: 0, sound: true, timer: null };
        const music = document.getElementById('game-music');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateVal(id, val) { 
            document.getElementById(id).innerText = val;
            if(id === 'p-val') document.getElementById('spies').max = val - 1;
        }

        function toggleSound() {
            gameState.sound = !gameState.sound;
            document.getElementById('sound-btn').innerText = `SOUND: ${gameState.sound ? 'ON' : 'OFF'}`;
            if(!gameState.sound) music.pause();
        }

        async function startGame() {
            gameState.players = parseInt(document.getElementById('players').value);
            const spyCount = parseInt(document.getElementById('spies').value);
            gameState.duration = parseInt(document.getElementById('duration').value) * 60;
            gameState.currentPlayer = 1;
            gameState.spies = [];

            while(gameState.spies.length < spyCount) {
                let r = Math.floor(Math.random() * gameState.players) + 1;
                if(!gameState.spies.includes(r)) gameState.spies.push(r);
            }

            const csvFile = document.getElementById('category').value;
            try {
                // FETCHING DIRECTLY FROM MAIN AREA (no "topics/" folder)
                const response = await fetch(csvFile + '?t=' + Date.now());
                if (!response.ok) throw new Error("404");
                const data = await response.text();
                const lines = data.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                gameState.secretWord = lines[Math.floor(Math.random() * lines.length)];
            } catch (err) {
                console.error(err);
                gameState.secretWord = "ERROR: FILE NOT FOUND"; 
            }

            if(gameState.sound) {
                music.volume = 0.4;
                music.currentTime = 0;
                music.play().catch(e => console.log("Audio blocked"));
            }
            
            updateRevealUI();
            showScreen('reveal-screen');
        }

        function handleSwipe(isHolding) {
            const screen = document.getElementById('reveal-screen');
            if(isHolding) {
                screen.classList.add('swiped-up');
                document.getElementById('next-btn').style.visibility = 'visible';
            } else {
                screen.classList.remove('swiped-up');
            }
        }

        function updateRevealUI() {
            document.getElementById('player-title').innerText = `PLAYER ${gameState.currentPlayer}`;
            const box = document.getElementById('secret-box');
            if(gameState.spies.includes(gameState.currentPlayer)) {
                box.innerText = "YOU ARE THE SPY";
                box.style.color = "red";
            } else {
                box.innerText = gameState.secretWord;
                box.style.color = "white";
            }
            document.getElementById('next-btn').style.visibility = 'hidden';
        }

        function nextPlayer() {
            if(gameState.currentPlayer < gameState.players) {
                gameState.currentPlayer++;
                updateRevealUI();
            } else {
                showScreen('game-screen');
                updateTimerDisplay(gameState.duration);
            }
        }

        function updateTimerDisplay(time) {
            let m = Math.floor(time / 60);
            let s = time % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }

        function runTimer() {
            document.getElementById('start-timer-btn').style.display = 'none';
            document.getElementById('stop-timer-btn').style.display = 'block';
            let timeLeft = gameState.duration;
            gameState.timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay(timeLeft);
                if(timeLeft <= 0) endTimer();
            }, 1000);
        }

        function endTimer() {
            clearInterval(gameState.timer);
            document.getElementById('timer-display').innerText = "VOTE!";
            document.getElementById('stop-timer-btn').style.display = 'none';
            document.getElementById('reveal-spy-btn').style.display = 'block';
        }

        function showFinalReveal() {
            music.pause();
            alert(`THE SPY WAS PLAYER: ${gameState.spies.sort().join(", ")}`);
            location.reload();
        }
    </script>
</body>
</html>
